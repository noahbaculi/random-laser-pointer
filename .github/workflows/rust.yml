name: Rust CICD

on: ["push", "pull_request"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cargo-bins/cargo-binstall@main
      - name: Install espup
        run: cargo +stable binstall --no-confirm espup && espup install
      - name: Cargo Build
        run: source $HOME/export-esp.sh && cargo build --verbose
      - name: Cargo Test
        run: source $HOME/export-esp.sh && cargo test --verbose
      - name: Clippy
        run: source $HOME/export-esp.sh && cargo clippy --all-targets --all-features

